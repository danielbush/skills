# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: "3"

vars:
  GREETING: Hello, world!

tasks:
  default:
    desc: Print a greeting message
    cmds:
      - echo "{{.GREETING}}"
    silent: true

  skills:add:
    desc: Add skills
    summary: |
      Change --agent for your editor if supported.
    cmds:
      - bunx skills add anthropics/skills --agent claude-code --skill skill-creator

    silent: true

  skills:validate:
    desc: Validate skills
    summary: |
      Note that agentsksills repo is a reference implementation.
    cmds:
      - uvx \
        --from "git+https://github.com/agentskills/agentskills.git#subdirectory=skills-ref" \
        skills-ref \
        validate skills/nullables

  fetch:skill-creator:
    desc: Fetch anthropic create-skills repo using opensrc
    cmds:
      - bunx opensrc fetch https://github.com/anthropics/skills/tree/main/skills/skill-creator
    silent: true
